name: Publish Livess Sync APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: livess-sync-android-release-main
  cancel-in-progress: false

env:
  AWS_REGION: sa-east-1
  RELEASE_VERSION: 1.0.1
  RELEASE_CERT_SHA256: 159f2ee5673b5be69cd8871ac2de81d5d175903cad4eb8ef1f73787f5cc7d19c

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout accepted Android source
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Validate release configuration
        shell: bash
        env:
          ROLE_ARN: ${{ vars.AWS_ANDROID_RELEASE_ROLE_ARN }}
          BUCKET: ${{ vars.AWS_ANDROID_RELEASE_BUCKET }}
          DISTRIBUTION_ID: ${{ vars.AWS_ANDROID_RELEASE_DISTRIBUTION_ID }}
          BASE_URL: ${{ vars.AWS_ANDROID_RELEASE_BASE_URL }}
          KEYSTORE_B64: ${{ secrets.LIVESS_ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.LIVESS_ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LIVESS_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LIVESS_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in ROLE_ARN BUCKET DISTRIBUTION_ID BASE_URL KEYSTORE_B64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!value}" ]; then
              echo "::error::Missing required Android release variable or secret: $value"
              exit 1
            fi
          done
          [[ "$ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/.+$ ]]
          [[ "$BASE_URL" =~ ^https://[^/]+$ ]]

      - name: Materialize signing key
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.LIVESS_ANDROID_KEYSTORE_B64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/livess-signing"
          printf '%s' "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/livess-signing/release.jks"
          chmod 600 "$RUNNER_TEMP/livess-signing/release.jks"

      - name: Test, lint, sign, and assemble release
        shell: bash
        env:
          LIVESS_ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/livess-signing/release.jks
          LIVESS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.LIVESS_ANDROID_KEYSTORE_PASSWORD }}
          LIVESS_ANDROID_KEY_ALIAS: ${{ secrets.LIVESS_ANDROID_KEY_ALIAS }}
          LIVESS_ANDROID_KEY_PASSWORD: ${{ secrets.LIVESS_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon \
            testDebugUnitTest \
            lintDebug \
            lintRelease \
            verifyReleaseSigning \
            assembleRelease

      - name: Configure temporary AWS publisher credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ANDROID_RELEASE_ROLE_ARN }}
          role-session-name: livess-sync-release-${{ github.run_id }}
          unset-current-credentials: true

      - name: Publish immutable APK and latest manifest
        shell: bash
        env:
          BUCKET: ${{ vars.AWS_ANDROID_RELEASE_BUCKET }}
          DISTRIBUTION_ID: ${{ vars.AWS_ANDROID_RELEASE_DISTRIBUTION_ID }}
          BASE_URL: ${{ vars.AWS_ANDROID_RELEASE_BASE_URL }}
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          RELEASE_FILE="livess-call-log-sync-${RELEASE_VERSION}.apk"
          ARTIFACT_KEY="releases/${RELEASE_VERSION}/${RELEASE_FILE}"
          CHECKSUM_KEY="${ARTIFACT_KEY}.sha256"
          APK_URL="${BASE_URL}/${ARTIFACT_KEY}"
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"

          PACKAGE_LINE="$("$BUILD_TOOLS/aapt" dump badging "$APK" | sed -n '1p')"
          if [[ "$PACKAGE_LINE" != *"name='br.com.livess.callsync'"* ]]; then
            echo "::error::Signed APK package mismatch: $PACKAGE_LINE"
            exit 1
          fi
          if [[ "$PACKAGE_LINE" != *"versionName='${RELEASE_VERSION}'"* ]]; then
            echo "::error::Signed APK version mismatch: $PACKAGE_LINE"
            exit 1
          fi
          "$BUILD_TOOLS/apksigner" verify "$APK"
          ACTUAL_CERT="$("$BUILD_TOOLS/apksigner" verify --print-certs "$APK" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | tr '[:upper:]' '[:lower:]')"
          if [[ -z "$ACTUAL_CERT" ]]; then
            echo "::error::apksigner returned no SHA-256 certificate digest"
            exit 1
          fi
          if [[ "$ACTUAL_CERT" != "$RELEASE_CERT_SHA256" ]]; then
            echo "::error::Signed APK certificate mismatch: expected=$RELEASE_CERT_SHA256 actual=$ACTUAL_CERT"
            exit 1
          fi

          SHA256="$(sha256sum "$APK" | awk '{print $1}')"
          printf '%s  %s\n' "$SHA256" "$RELEASE_FILE" > "$RUNNER_TEMP/${RELEASE_FILE}.sha256"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --arg appId "livess-call-log-sync" \
            --arg version "$RELEASE_VERSION" \
            --arg sourceSha "$GITHUB_SHA" \
            --arg apkUrl "$APK_URL" \
            --arg sha256 "$SHA256" \
            --arg publishedAt "$PUBLISHED_AT" \
            '{appId:$appId,version:$version,sourceSha:$sourceSha,apkUrl:$apkUrl,sha256:$sha256,publishedAt:$publishedAt}' \
            > "$RUNNER_TEMP/latest.json"

          aws s3api put-object \
            --region "$AWS_REGION" --bucket "$BUCKET" --key "$ARTIFACT_KEY" --body "$APK" \
            --content-type application/vnd.android.package-archive \
            --cache-control public,max-age=31536000,immutable --if-none-match '*'
          aws s3api put-object \
            --region "$AWS_REGION" --bucket "$BUCKET" --key "$CHECKSUM_KEY" --body "$RUNNER_TEMP/${RELEASE_FILE}.sha256" \
            --content-type text/plain --cache-control public,max-age=31536000,immutable --if-none-match '*'

          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location "$APK_URL" --output "$RUNNER_TEMP/public.apk"; then break; fi
            sleep 5
          done
          echo "${SHA256}  $RUNNER_TEMP/public.apk" | sha256sum --check

          aws s3 cp "$RUNNER_TEMP/latest.json" "s3://${BUCKET}/latest.json" \
            --region "$AWS_REGION" --content-type application/json --cache-control no-cache,max-age=0 --only-show-errors
          INVALIDATION_ID="$(aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" --paths /latest.json \
            --query 'Invalidation.Id' --output text)"
          aws cloudfront wait invalidation-completed --distribution-id "$DISTRIBUTION_ID" --id "$INVALIDATION_ID"
          curl --fail --silent --show-error --location "${BASE_URL}/latest.json" --output "$RUNNER_TEMP/public-latest.json"
          diff -u <(jq -S . "$RUNNER_TEMP/latest.json") <(jq -S . "$RUNNER_TEMP/public-latest.json")
          PUBLIC_APK_URL="$(jq -r .apkUrl "$RUNNER_TEMP/public-latest.json")"
          curl --fail --silent --show-error --location "$PUBLIC_APK_URL" --output "$RUNNER_TEMP/final-public.apk"
          echo "${SHA256}  $RUNNER_TEMP/final-public.apk" | sha256sum --check

      - name: Remove signing material
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/livess-signing"
